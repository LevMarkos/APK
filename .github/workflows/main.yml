name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Install buildozer & cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Use patched python-for-android
      run: |
        git clone --depth 1 --branch master https://github.com/opacam/python-for-android.git /tmp/p4a
        mkdir -p ~/.local/share/python-for-android
        rm -rf ~/.local/share/python-for-android
        cp -r /tmp/p4a ~/.local/share/python-for-android

    - name: Setup Android SDK and accept licenses
      run: |
        mkdir -p /tmp/sdk/cmdline-tools
        cd /tmp/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools latest
        export ANDROID_SDK_ROOT=/tmp/sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"

    - name: Configure buildozer.spec
      run: |
        echo "p4a.local_recipes = ~/.local/share/python-for-android" >> buildozer.spec
        echo "p4a.branch = master" >> buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "android.ndk = 25b" >> buildozer.spec
        echo "android.ndk_api = 21" >> buildozer.spec
        echo "android.build_tools = 30.0.3" >> buildozer.spec
        sed -i '/^android.sdk_path/d' buildozer.spec

    - name: Build APK
      run: buildozer -v android debug
      env:
        ANDROID_HOME: /tmp/sdk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: license-plate-apk
        path: bin/*.apk
