name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build APK with Buildozer in Docker
      run: |
        docker run --rm -v ${{ github.workspace }}:/project -w /project kivy/buildozer:latest /bin/bash -c "yes | buildozer -v android debug"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: license-plate-apk
        path: bin/*.apk
