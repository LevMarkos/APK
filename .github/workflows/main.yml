name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Clone patched python-for-android
        run: |
          git clone --depth 1 --branch master https://github.com/opacam/python-for-android.git /tmp/p4a
          mkdir -p ~/.local/share
          rm -rf ~/.local/share/python-for-android
          cp -r /tmp/p4a ~/.local/share/python-for-android

      - name: Configure buildozer.spec
        run: |
          # уже должен быть правильный buildozer.spec, но на всякий случай добавляем строки
          echo "p4a.local_recipes = ~/.local/share/python-for-android" >> buildozer.spec
          echo "p4a.branch = master" >> buildozer.spec

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: license-plate-apk
          path: bin/*.apkname: Build APK

