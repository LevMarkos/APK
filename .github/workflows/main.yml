name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Use patched python-for-android (fixes 404 errors)
        run: |
          git clone --depth 1 --branch master https://github.com/opacam/python-for-android.git /tmp/p4a
          mkdir -p /home/runner/.local/share/python-for-android
          rm -rf /home/runner/.local/share/python-for-android
          cp -r /tmp/p4a /home/runner/.local/share/python-for-android

      - name: Configure buildozer.spec
        run: |
          # Добавляем настройки для использования локального p4a и автоматического принятия лицензий
          echo "p4a.local_recipes = /home/runner/.local/share/python-for-android" >> buildozer.spec
          echo "p4a.branch = master" >> buildozer.spec
          echo "android.accept_sdk_license = True" >> buildozer.spec
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.ndk_api = 21" >> buildozer.spec
          # Убедимся, что SDK путь не переопределён
          sed -i '/^android.sdk_path/d' buildozer.spec

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: license-plate-apk
          path: bin/*.apk
